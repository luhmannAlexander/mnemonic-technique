# Production stack — ImplementationPlan §5.3 (standalone, NOT a Sail override).
#
# Run with:  docker compose -f docker-compose.prod.yml up -d
# Reads secrets from `.env` (copy .env.production → .env first).
#
# Hardening vs. dev compose.yaml:
#   - mariadb / redis / ollama expose NO host ports (internal network only)
#   - redis requires a password; mariadb uses a dedicated non-root user
#   - nginx terminates TLS on 80/443 and reverse-proxies to the app
#   - no Vite/XDEBUG; restart: unless-stopped on every service
#
# Host cron (crontab -e) — runs the scheduler so trash:purge fires daily 03:00:
#   * * * * * cd /var/www/mnemonic && docker compose -f docker-compose.prod.yml exec -T laravel.test php artisan schedule:run >> /var/log/mnemonic-scheduler.log 2>&1

services:
    laravel.test:
        build:
            context: './vendor/laravel/sail/runtimes/8.5'
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP:-1000}'
                MYSQL_CLIENT: mariadb-client
        image: 'sail-8.5/app'
        environment:
            WWWUSER: '${WWWUSER:-1000}'
            APP_ENV: production
            APP_DEBUG: 'false'
        volumes:
            - '.:/var/www/html'
        networks:
            - mnemonic
        depends_on:
            - mariadb
            - redis
            - ollama
        restart: unless-stopped

    horizon:
        image: 'sail-8.5/app'
        environment:
            WWWUSER: '${WWWUSER:-1000}'
            APP_ENV: production
        volumes:
            - '.:/var/www/html'
        networks:
            - mnemonic
        depends_on:
            - laravel.test
        command: php artisan horizon
        restart: unless-stopped

    mariadb:
        image: 'mariadb:11.8'
        environment:
            MYSQL_ROOT_PASSWORD: '${DB_ROOT_PASSWORD}'
            MYSQL_DATABASE: '${DB_DATABASE}'
            MYSQL_USER: '${DB_USERNAME}'
            MYSQL_PASSWORD: '${DB_PASSWORD}'
        volumes:
            - 'mnemonic-mariadb:/var/lib/mysql'
        networks:
            - mnemonic
        restart: unless-stopped
        healthcheck:
            test: ['CMD', 'healthcheck.sh', '--connect', '--innodb_initialized']
            retries: 3
            timeout: 5s

    redis:
        image: 'redis:7.4-alpine'
        command: redis-server --requirepass "${REDIS_PASSWORD}" --appendonly yes
        volumes:
            - 'mnemonic-redis:/data'
        networks:
            - mnemonic
        restart: unless-stopped
        healthcheck:
            test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
            retries: 3
            timeout: 5s

    ollama:
        image: 'ollama/ollama:0.24.0-rocm'
        devices:
            - /dev/kfd
            - /dev/dri
        volumes:
            - 'ollama-data:/root/.ollama'
        networks:
            - mnemonic
        restart: unless-stopped
        # Uncomment if the GPU is not auto-detected (TechStack §6.2):
        # environment:
        #     HSA_OVERRIDE_GFX_VERSION: '11.0.0'

    nginx:
        image: 'nginx:1.27-alpine'
        ports:
            - '80:80'
            - '443:443'
        volumes:
            - './docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro'
            - '/etc/letsencrypt:/etc/letsencrypt:ro'
        networks:
            - mnemonic
        depends_on:
            - laravel.test
        restart: unless-stopped

networks:
    mnemonic:
        driver: bridge

volumes:
    mnemonic-mariadb:
        driver: local
    mnemonic-redis:
        driver: local
    ollama-data:
        driver: local
