# Production reverse proxy — ImplementationPlan §5.3 (adapted).
#
# NOTE: the Laravel Sail runtime image serves HTTP directly on port 80 (it is
# not php-fpm on :9000), so nginx terminates TLS and reverse-proxies to the app
# container rather than using fastcgi_pass. Replace `your-domain.com` throughout
# and install certs with: certbot certonly --standalone -d your-domain.com

upstream mnemonic_app {
    server laravel.test:80;
}

# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name your-domain.com;              # ADJUST
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name your-domain.com;              # ADJUST

    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;   # ADJUST
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;     # ADJUST
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 4M;   # headroom above the 2MB upload limit

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://mnemonic_app;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";   # Livewire/websocket-style updates
        proxy_read_timeout 150s;                          # > OLLAMA_TIMEOUT_EXTRACT (120s)
    }
}
